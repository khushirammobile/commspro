kind = "web"
previewPath = "/"
title = "CommsPro"
version = "1.0.0"
id = "artifacts/comms-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25329

[services.development]
run = "pnpm --filter @workspace/comms-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/comms-platform", "run", "build" ]
publicDir = "artifacts/comms-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25329"
BASE_PATH = "/"
