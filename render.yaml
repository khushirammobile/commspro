services:
  - type: web
    name: commspro
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && PORT=3000 BASE_PATH=/ pnpm --filter @workspace/comms-platform run build && pnpm --filter @workspace/api-server run build && node scripts/seed-render.mjs
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
